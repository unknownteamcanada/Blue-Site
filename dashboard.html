<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <h1 class="text-center mt-4">Banking Dashboard</h1>
        <div class="row mt-5">
            <div class="col-md-6">
                <h3>Account Summary</h3>
                <ul class="list-group">
                    <li class="list-group-item">Account Balance: $5,000</li>
                    <li class="list-group-item">Available Credit: $2,000</li>
                    <li class="list-group-item">Pending Transactions: $200</li>
                </ul>
            </div>
            <div class="col-md-6">
                <h3>Recent Transactions</h3>
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2026-02-20</td>
                            <td>Deposit</td>
                            <td>$1,000</td>
                        </tr>
                        <tr>
                            <td>2026-02-21</td>
                            <td>Withdrawal</td>
                            <td>-$200</td>
                        </tr>
                        <tr>
                            <td>2026-02-22</td>
                            <td>Transfer</td>
                            <td>-$300</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <footer class="text-center mt-5">
            <p>&copy; 2026 Banking Dashboard</p>
        </footer>
    </div>
</body>
</html>

<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BankUp - Transfers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { box-sizing: border-box; }
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: -0.01em;
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 112, 255, 0.3); }
      50% { box-shadow: 0 0 30px rgba(0, 112, 255, 0.5); }
    }

    .glow-effect { animation: glow-pulse 3s ease-in-out infinite; }

    .glass-morphism {
      background: rgba(18, 18, 18, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .glossy-card { position: relative; overflow: hidden; }
    .glossy-card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s;
    }
    .glossy-card:hover::before { left: 100%; }

    .nav-item {
      position: relative;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .nav-item::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 0;
      background: #0070FF;
      transition: height 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 112, 255, 0.8);
    }
    .nav-item:hover::before, .nav-item.active::before { height: 60%; }

    .gradient-border {
      position: relative;
      background: #121212;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0, 112, 255, 0.5), rgba(255, 255, 255, 0.1));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .sidebar-backdrop {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 40; opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .sidebar-backdrop.active { opacity: 1; pointer-events: auto; }

    .mobile-sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 280px; z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }
    .mobile-sidebar.active { transform: translateX(0); }

    .hamburger-line {
      display: block; width: 24px; height: 2px;
      background-color: currentColor;
      transition: all 0.3s ease;
    }
    .hamburger-line:not(:last-child) { margin-bottom: 5px; }
    .hamburger.active .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.active .hamburger-line:nth-child(2) { opacity: 0; }
    .hamburger.active .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .transition-smooth { transition: all 0.3s ease; }
    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 112, 255, 0.2);
    }
    a { transition: all 0.3s ease; }
    .nav-item.active { background-color: rgba(0, 112, 255, 0.1); }

    .nav-section-title {
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 0.75rem 1rem; margin-top: 0.5rem; opacity: 0.6;
    }

    .pulse-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #0070FF;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem; font-weight: 500;
    }
    .badge-success { background-color: rgba(34,197,94,0.2); color: #22c55e; }
    .badge-warning { background-color: rgba(245,158,11,0.2); color: #f59e0b; }
    .badge-info { background-color: rgba(59,130,246,0.2); color: #3b82f6; }
    .badge-error { background-color: rgba(239,68,68,0.2); color: #ef4444; }

    .transfer-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      color: #fff;
      width: 100%;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      font-size: 0.875rem;
    }
    .transfer-input:focus {
      border-color: rgba(0,112,255,0.6);
      box-shadow: 0 0 0 3px rgba(0,112,255,0.15);
    }
    .transfer-input::placeholder { color: #9CA3AF; }
    .transfer-input option { background: #121212; }

    .contact-card {
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }
    .contact-card:hover { border-color: rgba(0,112,255,0.4); transform: translateY(-2px); }
    .contact-card.selected { border-color: #0070FF; box-shadow: 0 0 15px rgba(0,112,255,0.3); }

    .amount-preset {
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: #9CA3AF;
      font-size: 0.875rem;
      transition: all 0.3s ease;
    }
    .amount-preset:hover, .amount-preset.active {
      border-color: #0070FF;
      background: rgba(0,112,255,0.1);
      color: #fff;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: slide-up 0.4s ease-out forwards; }

    .tx-row {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s;
    }
    .tx-row:last-child { border-bottom: none; }
    .tx-row:hover { background: rgba(255,255,255,0.03); }

    .step-indicator {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600;
    }
    .step-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .step-line.active { background: #0070FF; }

    @keyframes success-pop {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .success-pop { animation: success-pop 0.5s ease-out forwards; }
  </style>
 </head>
 <body class="h-full bg-black text-white overflow-auto">
  <div id="root" class="w-full h-full"></div>
  <script>
    const accentColor = '#0070FF';
    const surfaceColor = '#121212';
    const textColor = '#FFFFFF';
    const secondaryText = '#9CA3AF';
    const bgColor = '#050505';
    const bankName = 'BankUp';
    const userName = 'Carlos M.';
    const balance = 45829.50;

    let isSidebarOpen = false;
    let selectedContact = null;
    let currentStep = 1;

    const contacts = [
      { id: 1, name: 'Ana García', initials: 'AG', account: '**** 4821', bank: 'Santander', color: '#8B5CF6' },
      { id: 2, name: 'Luis Pérez', initials: 'LP', account: '**** 2039', bank: 'BBVA', color: '#EC4899' },
      { id: 3, name: 'María López', initials: 'ML', account: '**** 7714', bank: 'CaixaBank', color: '#10B981' },
      { id: 4, name: 'Carlos Ruiz', initials: 'CR', account: '**** 5503', bank: 'Sabadell', color: '#F59E0B' },
    ];

    const recentTransfers = [
      { id: 1, name: 'Ana García', amount: -250.00, date: 'Today, 10:32', status: 'completed', type: 'sent' },
      { id: 2, name: 'Luis Pérez', amount: 500.00, date: 'Yesterday, 18:15', status: 'completed', type: 'received' },
      { id: 3, name: 'María López', amount: -75.50, date: '24 Feb, 09:00', status: 'pending', type: 'sent' },
      { id: 4, name: 'Carlos Ruiz', amount: -1200.00, date: '22 Feb, 14:20', status: 'completed', type: 'sent' },
      { id: 5, name: 'Self Transfer', amount: -3000.00, date: '20 Feb, 11:05', status: 'completed', type: 'internal' },
    ];

    function formatCurrency(amount) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(amount);
    }

    function toggleSidebar() {
      isSidebarOpen = !isSidebarOpen;
      const sidebar = document.getElementById('mobile-sidebar');
      const backdrop = document.getElementById('sidebar-backdrop');
      const hamburger = document.getElementById('hamburger-btn');
      if (isSidebarOpen) {
        sidebar.classList.add('active'); backdrop.classList.add('active'); hamburger.classList.add('active');
        document.body.style.overflow = 'hidden';
      } else {
        sidebar.classList.remove('active'); backdrop.classList.remove('active'); hamburger.classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    function closeSidebar() { if (isSidebarOpen) toggleSidebar(); }

    function selectContact(id) {
      selectedContact = id;
      document.querySelectorAll('.contact-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-contact="${id}"]`)?.classList.add('selected');
    }

    function selectPreset(amount, btn) {
      document.querySelectorAll('.amount-preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('amount-input').value = amount;
    }

    function goToStep(step) {
      if (step === 2) {
        const amount = document.getElementById('amount-input').value;
        if (!selectedContact || !amount || parseFloat(amount) <= 0) {
          showToast('Please select a contact and enter a valid amount.', 'error');
          return;
        }
      }
      currentStep = step;
      document.querySelectorAll('.step-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById(`step-${step}`).classList.remove('hidden');
      document.getElementById(`step-${step}`).classList.add('slide-up');
      updateStepIndicators();
      if (step === 2) populateReview();
    }

    function updateStepIndicators() {
      [1, 2, 3].forEach(i => {
        const dot = document.getElementById(`step-dot-${i}`);
        const line = document.getElementById(`step-line-${i}`);
        if (i < currentStep) {
          dot.style.background = accentColor; dot.style.color = '#fff';
          if (line) line.classList.add('active');
        } else if (i === currentStep) {
          dot.style.background = accentColor; dot.style.color = '#fff';
        } else {
          dot.style.background = 'rgba(255,255,255,0.1)'; dot.style.color = secondaryText;
          if (line) line.classList.remove('active');
        }
      });
    }

    function populateReview() {
      const contact = contacts.find(c => c.id === selectedContact);
      const amount = parseFloat(document.getElementById('amount-input').value);
      const note = document.getElementById('note-input').value;
      const fee = amount >= 1000 ? 0 : 0.50;
      document.getElementById('review-to').textContent = contact.name;
      document.getElementById('review-account').textContent = contact.account + ' · ' + contact.bank;
      document.getElementById('review-amount').textContent = formatCurrency(amount);
      document.getElementById('review-fee').textContent = fee === 0 ? 'Free' : formatCurrency(fee);
      document.getElementById('review-total').textContent = formatCurrency(amount + fee);
      document.getElementById('review-note').textContent = note || '—';
    }

    function confirmTransfer() {
      goToStep(3);
      setTimeout(() => {
        document.getElementById('success-icon').classList.add('success-pop');
      }, 100);
    }

    function newTransfer() {
      currentStep = 1;
      selectedContact = null;
      document.getElementById('amount-input').value = '';
      document.getElementById('note-input').value = '';
      document.querySelectorAll('.contact-card').forEach(c => c.classList.remove('selected'));
      document.querySelectorAll('.amount-preset').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.step-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById('step-1').classList.remove('hidden');
      updateStepIndicators();
    }

    function showToast(msg, type) {
      const existing = document.getElementById('toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.id = 'toast';
      toast.className = `fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl text-sm font-medium slide-up`;
      toast.style.cssText = `background: ${type === 'error' ? 'rgba(239,68,68,0.15)' : 'rgba(34,197,94,0.15)'}; border: 1px solid ${type === 'error' ? 'rgba(239,68,68,0.4)' : 'rgba(34,197,94,0.4)'}; color: ${type === 'error' ? '#ef4444' : '#22c55e'}; backdrop-filter: blur(10px);`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

          </a>
          <a href="analytics.html" data-page="analytics" ${onclick} class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg transition-smooth hover:bg-white/5">
            <svg class="w-5 h-5" style="color:${secondaryText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="font-medium text-sm" style="color:${secondaryText}">Analytics</span>
          </a>
          <a href="transfers.html" data-page="transfers" ${onclick} class="nav-item active flex items-center gap-3 px-4 py-3 rounded-lg transition-smooth hover:bg-white/5">
            <svg class="w-5 h-5" style="color:${accentColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
            <span class="font-medium text-sm" style="color:${textColor}">Transfers</span>
          </a>
        </nav>
        <nav class="flex-1 space-y-1 mb-8">
          <p class="nav-section-title" style="color:${secondaryText}">Investments</p>
          <a href="crypto.html" ${onclick} class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg transition-smooth hover:bg-white/5">
            <svg class="w-5 h-5" style="color:${secondaryText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="font-medium text-sm" style="color:${secondaryText}">Crypto</span>
          </a>
          <a href="stocks.html" ${onclick} class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg transition-smooth hover:bg-white/5">
            <svg class="w-5 h-5" style="color:${secondaryText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8L5.5 19.5"/></svg>
            <span class="font-medium text-sm" style="color:${secondaryText}">Stocks</span>
          </a>
          <a href="funds.html" ${onclick} class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg transition-smooth hover:bg-white/5">
            <svg class="w-5 h-5" style="color:${secondaryText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="font-medium text-sm" style="color:${secondaryText}">Funds</span>
          </a>
        </nav>
        <nav class="flex-1 space-y-1 mb-8">
          <p class="nav-section-title" style="color:${secondaryText}">Services</p>
          <a href="savings.html" ${onclick} class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg transition-smooth hover:bg-white/5">
            <svg class="w-5 h-5" style="color:${secondaryText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="font-medium text-sm" style="color:${secondaryText}">Savings</span>
          </a>
          <a href="cards.html" ${onclick} class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg transition-smooth hover:bg-white/5">
            <svg class="w-5 h-5" style="color:${secondaryText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
            <span class="font-medium text-sm" style="color:${secondaryText}">Cards</span>

          <a href="loans.html" ${onclick} class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg transition-smooth hover:bg-white/5">
            <svg class="w-5 h-5" style="color:${secondaryText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

          <a href="insurance.html" ${onclick} class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg transition-smooth hover:bg-white/5">
            <svg class="w-5 h-5" style="color:${secondaryText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m7.773-4.227A10 10 0 1112 2.236a10 10 0 017.773 18.764z"/></svg>

        </nav>
        <nav class="flex-1 space-y-1 mb-8">

            <svg class="w-5 h-5" style="color:${secondaryText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span class="font-medium text-sm" style="color:${secondaryText}">Reports</span>

    function renderContacts() {
      return contacts.map(c => `
        <div class="contact-card rounded-xl p-3 md:p-4 flex flex-col items-center gap-2 cursor-pointer transition-smooth"
             data-contact="${c.id}"
             onclick="selectContact(${c.id})"
             style="background: rgba(255,255,255,0.03); border: 2px solid transparent;">
          <div class="w-12 h-12 rounded-full flex items-center justify-center font-semibold text-white text-sm flex-shrink-0" style="background: linear-gradient(135deg, ${c.color}, ${c.color}aa)">
            ${c.initials}
          </div>
          <div class="text-center">
            <p class="font-medium text-xs text-white truncate max-w-[80px]">${c.name.split(' ')[0]}</p>
            <p class="text-xs" style="color:${secondaryText}">${c.bank}</p>
          </div>
        </div>
      `).join('');
    }

    function renderRecentTransfers() {
      return recentTransfers.map(tx => `
        <div class="tx-row p-4">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background: ${tx.type === 'received' ? 'rgba(34,197,94,0.1)' : tx.type === 'internal' ? 'rgba(0,112,255,0.1)' : 'rgba(239,68,68,0.1)'}">
                <svg class="w-5 h-5" style="color: ${tx.type === 'received' ? '#22c55e' : tx.type === 'internal' ? accentColor : '#ef4444'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  ${tx.type === 'received'
                    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>'
                    : tx.type === 'internal'
                    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>'
                    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7M12 3v18"/>'}
                </svg>
              </div>
              <div>
                <p class="font-medium text-sm text-white">${tx.name}</p>
                <p class="text-xs" style="color:${secondaryText}">${tx.date}</p>
              </div>
            </div>
            <div class="text-right">
              <p class="font-semibold text-sm" style="color: ${tx.amount < 0 ? '#ef4444' : '#22c55e'}">${tx.amount > 0 ? '+' : ''}${formatCurrency(Math.abs(tx.amount))}</p>
              <span class="badge ${tx.status === 'completed' ? 'badge-success' : 'badge-warning'}">${tx.status}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts - BankUp Premium Neobank</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { box-sizing: border-box; }
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: -0.01em;
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 112, 255, 0.3); }
      50% { box-shadow: 0 0 30px rgba(0, 112, 255, 0.5); }
    }

    .glow-effect {
      animation: glow-pulse 3s ease-in-out infinite;
    }

    .glass-morphism {
      background: rgba(18, 18, 18, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .glossy-card {
      position: relative;
      overflow: hidden;
    }

    .glossy-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s;
    }

    .glossy-card:hover::before {
      left: 100%;
    }

    .nav-item {
      position: relative;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .nav-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      background: #0070FF;
      transition: height 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 112, 255, 0.8);
    }

    .nav-item:hover::before,
    .nav-item.active::before {
      height: 60%;
    }

    .gradient-border {
      position: relative;
      background: #121212;
    }

    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0, 112, 255, 0.5), rgba(255, 255, 255, 0.1));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 40;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .sidebar-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .mobile-sidebar.active {
      transform: translateX(0);
    }

    .hamburger-line {
      display: block;
      width: 24px;
      height: 2px;
      background-color: currentColor;
      transition: all 0.3s ease;
    }

    .hamburger-line:not(:last-child) {
      margin-bottom: 5px;
    }

    .hamburger.active .hamburger-line:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .hamburger.active .hamburger-line:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active .hamburger-line:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    .transition-smooth {
      transition: all 0.3s ease;
    }

    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 112, 255, 0.2);
    }

    .smooth-scroll {
      scroll-behavior: smooth;
    }

    .nav-item.active {
      background-color: rgba(0, 112, 255, 0.1);
    }

    .nav-section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      opacity: 0.6;
    }

    .account-card {
      position: relative;
      overflow: hidden;
    }

    .account-card::after {
      content: '';
      position: absolute;
      top: 0;
      right: -50px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(0, 112, 255, 0.1), transparent);
      border-radius: 50%;
    }

    .account-number {
      font-family: 'Monaco', 'Courier New', monospace;
      letter-spacing: 0.1em;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-active {
      background-color: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .badge-pending {
      background-color: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
    }

    .badge-saving {
      background-color: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }

    .badge-investment {
      background-color: rgba(168, 85, 247, 0.2);
      color: #a855f7;
    }

    .tab-button {
      position: relative;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .tab-button.active {
      border-bottom-color: #0070FF;
    }

    .transaction-row {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .transaction-row:last-child {
      border-bottom: none;
    }

    .stat-box {
      position: relative;
      overflow: hidden;
    }

    .stat-box::after {
      content: '';
      position: absolute;
      top: 0;
      right: -50px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(0, 112, 255, 0.1), transparent);
      border-radius: 50%;
    }

    .card-chip {
      position: relative;
      width: 50px;
      height: 40px;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.8), rgba(255, 255, 255, 0.3));
      border-radius: 8px;
      box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
    }

    .pulse-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0070FF;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .scrollbar-thin::-webkit-scrollbar-track {
      background: transparent;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .balance-animate {
      animation: count-up 1s ease-out;
    }

    @keyframes count-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .account-header-gradient {
      background: linear-gradient(135deg, #0070FF, #00B4DB);
    }

    .account-header-gradient-2 {
      background: linear-gradient(135deg, #00D4FF, #0055FF);
    }

    .account-header-gradient-3 {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .account-header-gradient-4 {
      background: linear-gradient(135deg, #f093fb, #f5576c);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      z-index: 101;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .modal.active {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .progress-bar {
      background: linear-gradient(90deg, #0070FF, #00D4FF);
      border-radius: 9999px;
      height: 4px;
      overflow: hidden;
    }

    .progress-fill {
      background: inherit;
      height: 100%;
      border-radius: 9999px;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-black text-white overflow-auto smooth-scroll">
  <div id="root" class="w-full h-full"></div>
  <script>
    const defaultConfig = {
      background_color: '#050505',
      surface_color: '#121212',
      accent_color: '#0070FF',
      text_color: '#FFFFFF',
      secondary_text_color: '#9CA3AF',
      bank_name: 'BankUp',
      user_name: 'Carlos M.',
      footer_text: '© 2026 BankUp Global. Secure Banking'
    };

    let config = { ...defaultConfig };
    let isSidebarOpen = false;
    let currentTab = 'all-accounts';
    let selectedAccount = null;

    // Datos de cuentas realistas
    const accounts = [
      {
        id: 1,
        name: 'Main Checking',
        type: 'checking',
        number: '••••••••9847',
        balance: 12450.75,
        currency: 'USD',
        status: 'active',
        gradient: 'account-header-gradient',
        iban: 'US12 1234 5678 9012 3456 7890',
        opened: '2022-05-15',
        accountHolder: 'Carlos Miguel Rodriguez',
        transactions: [
          { date: '2024-01-15', description: 'Salary Deposit', amount: 3500.00, type: 'income' },
          { date: '2024-01-12', description: 'Netflix Subscription', amount: -14.99, type: 'subscription' },
          { date: '2024-01-10', description: 'Whole Foods', amount: -87.45, type: 'food' }
        ]
      },
      {
        id: 2,
        name: 'Savings Fund',
        type: 'savings',
        number: '••••••••5034',
        balance: 28940.50,
        currency: 'USD',
        status: 'active',
        gradient: 'account-header-gradient-2',
        iban: 'US12 1234 5678 9012 3456 7891',
        opened: '2023-03-20',
        accountHolder: 'Carlos Miguel Rodriguez',
        apy: 4.5,
        transactions: [
          { date: '2024-01-14', description: 'Interest Credit', amount: 45.30, type: 'interest' },
          { date: '2024-01-05', description: 'Transfer In', amount: 5000.00, type: 'transfer' }
        ]
      },
      {
        id: 3,
        name: 'Investment Account',
        type: 'investment',
        number: '••••••••2156',
        balance: 8150.25,
        currency: 'USD',
        status: 'active',
        gradient: 'account-header-gradient-3',
        iban: 'US12 1234 5678 9012 3456 7892',
        opened: '2023-08-12',
        accountHolder: 'Carlos Miguel Rodriguez',
        performance: 4.2,
        transactions: [
          { date: '2024-01-13', description: 'Stock Purchase - AAPL', amount: -2500.00, type: 'investment' },
          { date: '2024-01-11', description: 'Dividend Payment', amount: 125.50, type: 'income' }
        ]
      },
      {
        id: 4,
        name: 'Business Account',
        type: 'business',
        number: '••••••••7823',
        balance: 4320.00,
        currency: 'USD',
        status: 'pending',
        gradient: 'account-header-gradient-4',
        iban: 'US12 1234 5678 9012 3456 7893',
        opened: '2024-01-01',
        accountHolder: 'Carlos M. Business LLC',
        transactions: [
          { date: '2024-01-14', description: 'Client Payment', amount: 1500.00, type: 'income' },
          { date: '2024-01-10', description: 'Office Supplies', amount: -234.67, type: 'expense' }
        ]
      }
    ];

    function toggleSidebar() {
      isSidebarOpen = !isSidebarOpen;
      const sidebar = document.getElementById('mobile-sidebar');
      const backdrop = document.getElementById('sidebar-backdrop');
      const hamburger = document.getElementById('hamburger-btn');
      
      if (isSidebarOpen) {
        sidebar.classList.add('active');
        backdrop.classList.add('active');
        hamburger.classList.add('active');
        document.body.style.overflow = 'hidden';
      } else {
        sidebar.classList.remove('active');
        backdrop.classList.remove('active');
        hamburger.classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    function closeSidebar() {
      if (isSidebarOpen) {
        toggleSidebar();
      }
    }

    function setActiveTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      renderAccounts();
    }

    function selectAccount(accountId) {
      selectedAccount = accounts.find(a => a.id === accountId);
      renderAccountDetail();
    }

    function deselectAccount() {
      selectedAccount = null;
      renderAccounts();
    }

    function formatCurrency(amount) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2
      }).format(amount);
    }

    function renderAccounts() {
      const container = document.getElementById('accounts-container');
      if (!container) return;

      let filteredAccounts = accounts;

      if (currentTab === 'checking') {
        filteredAccounts = accounts.filter(a => a.type === 'checking');
      } else if (currentTab === 'savings') {
        filteredAccounts = accounts.filter(a => a.type === 'savings');
      } else if (currentTab === 'investment') {
        filteredAccounts = accounts.filter(a => a.type === 'investment');
      }

      container.innerHTML = filteredAccounts.map(account => `
        <div class="cursor-pointer" onclick="selectAccount(${account.id})">
          <div class="surface-bg account-card rounded-2xl overflow-hidden hover-lift transition-smooth border border-white/10" style="background-color: ${config.surface_color}">
            <!-- Card Header with Gradient -->
            <div class="${account.gradient} h-24 md:h-32 p-4 md:p-6 flex items-end justify-between">
              <div>
                <p class="text-white/80 text-xs md:text-sm font-medium mb-1">Account</p>
                <h3 class="text-white font-bold text-lg md:text-2xl">${account.name}</h3>
              </div>
              <div class="card-chip"></div>
            </div>

            <!-- Card Content -->
            <div class="p-4 md:p-6">
              <div class="flex items-center justify-between mb-4">
                <div>
                  <p class="secondary-text text-xs md:text-sm mb-1" style="color: ${config.secondary_text_color}">Balance</p>
                  <p class="primary-text text-2xl md:text-3xl font-bold" style="color: ${config.text_color}">${formatCurrency(account.balance)}</p>
                </div>
                <div class="text-right">
                  <span class="badge ${account.status === 'active' ? 'badge-active' : 'badge-pending'}">
                    ${account.status === 'active' ? 'Active' : 'Pending'}
                  </span>
                </div>
              </div>

              <div class="space-y-2 text-xs md:text-sm">
                <div class="flex justify-between">
                  <span class="secondary-text" style="color: ${config.secondary_text_color}">Account Number</span>
                  <span class="primary-text account-number" style="color: ${config.text_color}">${account.number}</span>
                </div>
                <div class="flex justify-between">
                  <span class="secondary-text" style="color: ${config.secondary_text_color}">Account Type</span>
                  <span class="primary-text" style="color: ${config.text_color} text-transform: capitalize">${account.type}</span>
                </div>
                ${account.apy ? `
                  <div class="flex justify-between">
                    <span class="secondary-text" style="color: ${config.secondary_text_color}">APY</span>
                    <span class="text-green-400 font-medium">${account.apy}%</span>
                  </div>
                ` : ''}
                ${account.performance ? `
                  <div class="flex justify-between">
                    <span class="secondary-text" style="color: ${config.secondary_text_color}">Performance</span>
                    <span class="text-green-400 font-medium">+${account.performance}%</span>
                  </div>
                ` : ''}
              </div>

              <div class="mt-4 pt-4 border-t border-white/10 flex gap-2">
                <button class="flex-1 px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors hover:bg-white/5" style="color: ${config.accent_color}; border: 1px solid ${config.accent_color}">
                  View Details
                </button>
                <button class="flex-1 px-3 py-2 rounded-lg text-xs md:text-sm font-medium transition-colors hover:opacity-80" style="background-color: ${config.accent_color}; color: white">
                  Transfer
                </button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderAccountDetail() {
      const container = document.getElementById('accounts-container');
      if (!container || !selectedAccount) return;

      container.innerHTML = `
        <div>
          <!-- Back Button -->
          <button onclick="deselectAccount()" class="mb-6 flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-white/5 transition-colors" style="color: ${config.accent_color}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Back to Accounts
          </button>

          <!-- Account Header -->
          <div class="surface-bg rounded-2xl overflow-hidden mb-6 hover-lift transition-smooth" style="background-color: ${config.surface_color}">
            <div class="${selectedAccount.gradient} h-40 p-6 md:p-8 flex items-end justify-between">
              <div>
                <p class="text-white/80 text-sm font-medium mb-2">Account Details</p>
                <h2 class="text-white font-bold text-3xl md:text-4xl">${selectedAccount.name}</h2>
              </div>
              <div class="card-chip"></div>
            </div>

            <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-4 gap-6">
              <div class="stat-box">
                <p class="secondary-text text-sm mb-2" style="color: ${config.secondary_text_color}">Current Balance</p>
                <p class="primary-text text-2xl md:text-3xl font-bold" style="color: ${config.text_color}">${formatCurrency(selectedAccount.balance)}</p>
              </div>

              <div class="stat-box">
                <p class="secondary-text text-sm mb-2" style="color: ${config.secondary_text_color}">Account Number</p>
                <p class="primary-text account-number text-sm md:text-base" style="color: ${config.text_color}">${selectedAccount.number}</p>
              </div>

              <div class="stat-box">
                <p class="secondary-text text-sm mb-2" style="color: ${config.secondary_text_color}">Account Opened</p>
                <p class="primary-text text-sm md:text-base" style="color: ${config.text_color}">${new Date(selectedAccount.opened).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
              </div>

              <div class="stat-box">
                <p class="secondary-text text-sm mb-2" style="color: ${config.secondary_text_color}">Status</p>
                <span class="badge ${selectedAccount.status === 'active' ? 'badge-active' : 'badge-pending'}">
                  ${selectedAccount.status === 'active' ? 'Active' : 'Pending'}
                </span>
              </div>
            </div>
          </div>

          <!-- Account Information -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <!-- Account Holder Info -->
            <div class="surface-bg glossy-card rounded-2xl p-6 hover-lift transition-smooth border border-white/10" style="background-color: ${config.surface_color}">
              <h3 class="primary-text text-lg font-semibold mb-4" style="color: ${config.text_color}">Account Holder Information</h3>
              
              <div class="space-y-4">
                <div>
                  <p class="secondary-text text-sm mb-1" style="color: ${config.secondary_text_color}">Account Holder</p>
                  <p class="primary-text text-base" style="color: ${config.text_color}">${selectedAccount.accountHolder}</p>
                </div>

                <div>
                  <p class="secondary-text text-sm mb-1" style="color: ${config.secondary_text_color}">Account Type</p>
                  <p class="primary-text text-base capitalize" style="color: ${config.text_color}">${selectedAccount.type}</p>
                </div>

                <div>
                  <p class="secondary-text text-sm mb-1" style="color: ${config.secondary_text_color}">IBAN</p>
                  <p class="primary-text text-base account-number" style="color: ${config.text_color}">${selectedAccount.iban}</p>
                </div>

                <div>
                  <p class="secondary-text text-sm mb-1" style="color: ${config.secondary_text_color}">Currency</p>
                  <p class="primary-text text-base" style="color: ${config.text_color}">${selectedAccount.currency}</p>
                </div>
              </div>
            </div>

            <!-- Account Features -->
            <div class="surface-bg glossy-card rounded-2xl p-6 hover-lift transition-smooth border border-white/10" style="background-color: ${config.surface_color}">
              <h3 class="primary-text text-lg font-semibold mb-4" style="color: ${config.text_color}">Account Features</h3>
              
              <div class="space-y-3">
                <div class="flex items-center justify-between p-3 rounded-lg" style="background-color: rgba(255, 255, 255, 0.03)">
                  <span class="primary-text text-sm" style="color: ${config.text_color}">Online Banking</span>
                  <svg class="w-5 h-5 text-green-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                  </svg>
                </div>

                <div class="flex items-center justify-between p-3 rounded-lg" style="background-color: rgba(255, 255, 255, 0.03)">
                  <span class="primary-text text-sm" style="color: ${config.text_color}">Mobile Banking</span>
                  <svg class="w-5 h-5 text-green-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                  </svg>
                </div>

                <div class="flex items-center justify-between p-3 rounded-lg" style="background-color: rgba(255, 255, 255, 0.03)">
                  <span class="primary-text text-sm" style="color: ${config.text_color}">Debit Card</span>
                  <svg class="w-5 h-5 text-green-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                  </svg>
                </div>

                <div class="flex items-center justify-between p-3 rounded-lg" style="background-color: rgba(255, 255, 255, 0.03)">

          renderAccounts();
        },
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (value) => {
                config.background_color = value;
                window.elementSdk.setConfig({ background_color: value });
              }
            },
            {
              get: () => config.surface_color || defaultConfig.surface_color,
              set: (value) => {
                config.surface_color = value;
                window.elementSdk.setConfig({ surface_color: value });
              }
            },
            {
              get: () => config.text_color || defaultConfig.text_color,

                window.elementSdk.setConfig({ text_color: value });
              }

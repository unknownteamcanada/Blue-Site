<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BankUp - Analytics</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { box-sizing: border-box; }
    * { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }

    .glass-morphism {
      background: rgba(18,18,18,.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1);
    }

    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,112,255,.2);
    }

    .nav-item.active {
      background-color: rgba(0,112,255,.1);
    }

    .chart-bar {
      transform-origin: bottom;
      animation: grow .8s ease-out forwards;
    }

    @keyframes grow {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }

    .progress-bar {
      background: linear-gradient(90deg,#0070FF,#00D4FF);
      height:6px;
      border-radius:9999px;
    }
  </style>
</head>

<body class="h-full bg-black text-white overflow-auto">

<div id="root" class="w-full h-full"></div>

<script>

const defaultConfig = {
  background_color:'#050505',
  surface_color:'#121212',
  accent_color:'#0070FF',
  text_color:'#FFFFFF',
  secondary_text_color:'#9CA3AF',
  bank_name:'BankUp',
  user_name:'Carlos M.'
};

let config = {...defaultConfig};

let expenseCategories = [
  {name:"Shopping", value:35},
  {name:"Food", value:25},
  {name:"Transport", value:15},
  {name:"Subscriptions", value:10},
  {name:"Other", value:15}
];

let monthlyTrend = [40,55,48,70,65,75,60,82,76,88,90,95];

function formatCurrency(val){
  return new Intl.NumberFormat('en-US',{
    style:'currency',
    currency:'USD'
  }).format(val);
}

function renderBarChart(){
  const container = document.getElementById("trend-chart");
  container.innerHTML="";
  monthlyTrend.forEach((v,i)=>{
    const bar=document.createElement("div");
    bar.className="chart-bar flex flex-col items-center gap-2";
    bar.style.animationDelay=`${i*0.05}s`;
    bar.innerHTML=`
      <div class="w-8 rounded-t"
        style="height:${v*2}px;background:linear-gradient(to top,${config.accent_color},rgba(0,112,255,.3))">
      </div>
      <span class="text-xs" style="color:${config.secondary_text_color}">
        ${i+1}
      </span>
    `;
    container.appendChild(bar);
  });
}

function renderCategoryBreakdown(){
  const container=document.getElementById("category-breakdown");
  container.innerHTML="";
  expenseCategories.forEach(cat=>{
    container.innerHTML+=`
      <div>
        <div class="flex justify-between mb-1 text-sm">
          <span style="color:${config.text_color}">${cat.name}</span>
          <span style="color:${config.secondary_text_color}">${cat.value}%</span>
        </div>
        <div class="w-full bg-white/10 rounded-full">
          <div class="progress-bar" style="width:${cat.value}%"></div>
        </div>
      </div>
    `;
  });
}

function renderDonut(){
  const circle = document.getElementById("donut-ring");
  const percent = 67;
  const radius = 70;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - percent / 100 * circumference;
  circle.style.strokeDasharray = circumference;
  circle.style.strokeDashoffset = offset;
}

async function onConfigChange(newConfig){
  config={...config,...newConfig};
  init();
}

function init(){

document.getElementById("root").innerHTML=`

<div class="flex h-full" style="background:${config.background_color}">

  <!-- Sidebar -->
  <aside class="hidden md:flex w-64 flex-col p-6 border-r"
    style="background:${config.surface_color};border-color:rgba(255,255,255,.1)">

    <h1 class="text-2xl font-semibold mb-8"
      style="color:${config.text_color}">
      ${config.bank_name}
    </h1>

    <nav class="space-y-2">
      <a href="dashboard.html" class="nav-item block px-4 py-3 rounded-lg hover:bg-white/5">
        Dashboard
      </a>

      <a href="analytics.html"
         class="nav-item active block px-4 py-3 rounded-lg">
        Analytics
      </a>
    </nav>
  </aside>

  <!-- Content -->
  <main class="flex-1 p-6 overflow-auto">

    <h2 class="text-2xl font-semibold mb-6"
      style="color:${config.text_color}">
      Financial Analytics
    </h2>

    <!-- KPI Row -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

      <div class="glass-morphism rounded-xl p-5 hover-lift">
        <p style="color:${config.secondary_text_color}" class="text-sm">
          Monthly Revenue
        </p>
        <p class="text-2xl font-bold mt-2"
          style="color:${config.text_color}">
          ${formatCurrency(3500)}
        </p>
      </div>

      <div class="glass-morphism rounded-xl p-5 hover-lift">
        <p style="color:${config.secondary_text_color}" class="text-sm">
          Monthly Expenses
        </p>
        <p class="text-2xl font-bold mt-2"
          style="color:${config.text_color}">
          ${formatCurrency(2340)}
        </p>
      </div>

      <div class="glass-morphism rounded-xl p-5 hover-lift">
        <p style="color:${config.secondary_text_color}" class="text-sm">
          Net Savings
        </p>
        <p class="text-2xl font-bold mt-2"
          style="color:${config.accent_color}">
          ${formatCurrency(1160)}
        </p>
      </div>

    </div>

    <!-- Charts Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

      <!-- Trend Chart -->
      <div class="glass-morphism rounded-2xl p-6">
        <h3 class="mb-4 font-semibold"
          style="color:${config.text_color}">
          Monthly Trend
        </h3>

        <div id="trend-chart"
          class="flex items-end gap-3 h-64">
        </div>
      </div>

      <!-- Donut Chart -->
      <div class="glass-morphism rounded-2xl p-6">
        <h3 class="mb-4 font-semibold"
          style="color:${config.text_color}">
          Savings Ratio
        </h3>

        <div class="flex items-center justify-center">

          <svg width="180" height="180">
            <circle cx="90" cy="90" r="70"
              stroke="rgba(255,255,255,.1)"
              stroke-width="14"
              fill="transparent"/>

            <circle id="donut-ring"
              cx="90" cy="90" r="70"
              stroke="${config.accent_color}"
              stroke-width="14"
              fill="transparent"
              stroke-linecap="round"
              transform="rotate(-90 90 90)"/>
          </svg>

        </div>

        <p class="text-center mt-4 text-xl font-semibold"
          style="color:${config.text_color}">
          67% Saved
        </p>

      </div>

    </div>

    <!-- Category Breakdown -->
    <div class="glass-morphism rounded-2xl p-6 mt-8">
      <h3 class="mb-6 font-semibold"
        style="color:${config.text_color}">
        Expense Breakdown
      </h3>

      <div id="category-breakdown" class="space-y-5"></div>
    </div>

  </main>

</div>
`;

renderBarChart();
renderCategoryBreakdown();
renderDonut();

}

init();

</script>

</body>
</html>
